<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg-tim" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#6366f144"/>
      <stop offset="100%" stop-color="#6366f111"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#6366f122"/>
  <circle cx="100" cy="100" r="96" fill="url(#bg-tim)" stroke="#6366f166" stroke-width="2"/>
  
  <!-- Face circle -->
  <circle cx="100" cy="90" r="52" fill="#6366f133" stroke="#6366f188" stroke-width="1.5"/>
  
  <!-- Eyes -->
  <ellipse cx="84" cy="82" rx="5" ry="6" fill="#6366f1"/>
  <ellipse cx="116" cy="82" rx="5" ry="6" fill="#6366f1"/>
  
  <!-- Smile -->
  <path d="M82 100 Q100 116 118 100" stroke="#6366f1" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Initials -->
  <text x="100" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#6366f1">Tim</text>
  
  <!-- Small color accent at top -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.4"/>
</svg>