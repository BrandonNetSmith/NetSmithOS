<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg-elon" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#10b98144"/>
      <stop offset="100%" stop-color="#10b98111"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#10b98122"/>
  <circle cx="100" cy="100" r="96" fill="url(#bg-elon)" stroke="#10b98166" stroke-width="2"/>
  
  <!-- Face circle -->
  <circle cx="100" cy="90" r="52" fill="#10b98133" stroke="#10b98188" stroke-width="1.5"/>
  
  <!-- Eyes -->
  <ellipse cx="84" cy="82" rx="5" ry="6" fill="#10b981"/>
  <ellipse cx="116" cy="82" rx="5" ry="6" fill="#10b981"/>
  
  <!-- Smile -->
  <path d="M82 100 Q100 116 118 100" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Initials -->
  <text x="100" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#10b981">Elon</text>
  
  <!-- Small color accent at top -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#10b981" stroke-width="3" opacity="0.4"/>
</svg>