  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#f9731622"/>
  <circle cx="100" cy="100" r="96" fill="url(#bg-clay)" stroke="#f9731666" stroke-width="2"/>
  
  <!-- Face circle -->
